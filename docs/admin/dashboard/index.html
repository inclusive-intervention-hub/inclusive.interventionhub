<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Inclusive Materials</title>
  <script>
    // ── Password protection (SHA-256 hash) ──
    const HASH = '4d21fbba333628e24015e5bc0e04b0cdb22faf60038c77c2ef7a2032aecd2dc9';
    async function checkAuth() {
      if (sessionStorage.getItem('im_auth') === HASH) return showDashboard();
      document.getElementById('login-screen').style.display = 'flex';
    }
    async function tryLogin() {
      const pw = document.getElementById('login-pw').value;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if (hash === HASH) {
        sessionStorage.setItem('im_auth', HASH);
        showDashboard();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-pw').value = '';
        document.getElementById('login-pw').focus();
      }
    }
    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-root').style.display = 'block';
    }
    function logout() {
      sessionStorage.removeItem('im_auth');
      location.reload();
    }
    window.addEventListener('DOMContentLoaded', checkAuth);
  </script>
